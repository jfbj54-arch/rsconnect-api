<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastrar Usuário</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            padding: 40px;
        }
        .container {
            background: white;
            padding: 25px;
            width: 350px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0 0 10px #ccc;
        }
        input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }
        button {
            margin-top: 15px;
            width: 100%;
            padding: 12px;
            background: #0078ff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Cadastrar Usuário</h2>

    <input id="nome" placeholder="Nome">
    <input id="email" placeholder="Email">
    <input id="senha" placeholder="Senha" type="password">

    <button onclick="cadastrar()">Cadastrar</button>

    <p id="msg"></p>
</div>

<script>
    function cadastrar() {
        const usuario = {
            nome: document.getElementById("nome").value,
            email: document.getElementById("email").value,
            senha: document.getElementById("senha").value
        };

        fetch("http://localhost:5149/api/Usuarios", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(usuario)
        })
        .then(r => r.text())
        .then(t => document.getElementById("msg").innerText = "Usuário cadastrado!");
    }
</script>

</body>
</html>
